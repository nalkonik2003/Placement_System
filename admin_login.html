{% extends "base.html" %}

{% block title %}Admin Login - Placement System{% endblock %}

{% block content %}
<div class="form-container fade-in">
    <div class="form-section">
        <h2><i class="fas fa-user-shield"></i> Admin Login</h2>
        <p class="subtitle">Access the administration panel.</p>
        
        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Enter admin username" required>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Enter admin password" required>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 1rem; color: var(--gray);">
            <a href="{{ url_for('home') }}" style="color: var(--primary); text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </p>
    </div>
</div>
{% endblock %}
