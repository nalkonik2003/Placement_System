{% extends "base.html" %}

{% block title %}Student Login - Placement System{% endblock %}

{% block content %}
<div class="form-container fade-in">
    <div class="form-section">
        <h2><i class="fas fa-user-graduate"></i> Student Login</h2>
        <p class="subtitle">Welcome back! Please login to continue.</p>
        
        <form method="POST" action="{{ url_for('student_login') }}">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; color: var(--gray);">
            Don't have an account? <a href="{{ url_for('student_register') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
